app:
  title: "Healthcare Slot Recommendation API"
  version: "1.0.0"
  debug: false

model_path: "models/slot_prediction_model.pkl"

database:
  db_name: "dev"

  # MongoDB collection names — matched to real EMR collections
  collections:
    patients: "patient-details"
    providers: "users"
    appointments: "appointments"
    provider_schedules: "provider_schedules"
    slot_statistics: "slot_statistics"

slot_recommendation:
  search_start_days: 1
  search_days: 14
  top_k: 5
  slot_duration_minutes: 60
  slot_step_minutes: 60
  working_hours:
    start: 8
    end: 17
  cost_fn: 1000
  cost_fp: 200
  min_probability: 0.0

ranking:
  weights:
    probability: 0.40
    cost_utility: 0.30
    preference_score: 0.10
    patient_preference_match: 0.10
    slot_popularity_score: 0.05
    utilization_penalty: 0.05
  unique_per_day: false

# ============================================================
# READ-ONLY MODE — set to true only in controlled environments
# When false: ALL MongoDB write operations are blocked at runtime
# ============================================================
DB_WRITE_ENABLED: false

logging:
  level: "INFO"
  format: "json"
