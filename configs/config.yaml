app:
  title: "Healthcare Slot Recommendation API"
  version: "1.0.0"
  debug: false

model_path: "models/slot_prediction_model.pkl"

database:
  db_name: "dev"

  # MongoDB collection names — matched to real EMR collections
  collections:
    patients: "patient-details"
    providers: "users"
    appointments: "appointments"
    provider_schedules: "provider_schedules"
    slot_statistics: "slot_statistics"

slot_recommendation:
  search_start_days: 1
  search_days: 14
  top_k: 5
  slot_duration_minutes: 60
  slot_step_minutes: 60
  working_hours:
    start: 8
    end: 17
  cost_fn: 1000
  cost_fp: 200
  min_probability: 0.0

ranking:
  weights:
    probability: 0.40
    cost_utility: 0.30
    preference_score: 0.10
    patient_preference_match: 0.10
    slot_popularity_score: 0.05
    utilization_penalty: 0.05
  unique_per_day: false

# ============================================================
# READ-ONLY MODE — set to true only in controlled environments
# When false: ALL MongoDB write operations are blocked at runtime
# ============================================================
DB_WRITE_ENABLED: false

# ============================================================
# TRAINING CONFIGURATION — Notebook Parity Settings
# ============================================================
training:
  model_type: "catboost"
  notebook_parity: true  # Ensure perfect parity with feature_engineering.ipynb
  
  # Model hyperparameters (matches notebook best configuration)
  hyperparameters:
    iterations: 800
    learning_rate: 0.05
    depth: 6
    l2_leaf_reg: 3
    loss_function: "Logloss"
    eval_metric: "AUC"
    random_seed: 42
  
  # Training strategy
  time_based_split: true  # Use temporal split (not random)
  test_size: 0.2
  cv_folds: 5
  
  # Hyperparameter tuning (optional, takes longer)
  enable_tuning: false
  tuning_iterations: 20
  
  # Calibration
  enable_calibration: true
  calibration_method: "isotonic"
  
  # Feature engineering
  enhance_features: true  # Apply notebook feature engineering
  feature_sources:
    - "base_features"  # From ml_ready_appointments.csv
    - "slot_features"  # Slot demand, popularity, success rate
    - "historical_features"  # Leakage-aware historical stats
    - "rolling_features"  # 7D/30D time-window features
    - "loyalty_features"  # Patient-provider loyalty

logging:
  level: "INFO"
  format: "json"
